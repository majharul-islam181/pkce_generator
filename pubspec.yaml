name: pkce_generator
description: >-
  A production-ready Dart package for generating PKCE (Proof Key for Code
  Exchange) values following RFC 7636. Supports S256 and plain code challenge
  methods for secure OAuth 2.0 / OpenID Connect authorization code flows.
version: 1.0.0
homepage: https://github.com/your-username/pkce_generator
repository: https://github.com/your-username/pkce_generator
issue_tracker: https://github.com/your-username/pkce_generator/issues

topics:
  - oauth
  - pkce
  - security
  - auth

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  crypto: ^3.0.3

dev_dependencies:
  test: ^1.24.0
